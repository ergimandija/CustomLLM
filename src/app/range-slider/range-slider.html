<div class="w-80 py-6 px-2">
  <div
    #track
    class="relative select-none rounded-full bg-slate-200 h-1 cursor-pointer"
    (click)="onTrackClick($event)"
  >
    <div
      class="h-full rounded-full bg-slate-800"
      style="position:absolute; left:0%"
      [style.width.%]="percent"
    ></div>

    <button
      role="slider"
      [attr.aria-valuemin]="min()"
      [attr.aria-valuemax]="max()"
      [attr.aria-valuenow]="value()"
      tabindex="0"
      (pointerdown)="onPointerDown($event)"
      (keydown)="onKeyDown($event)"
      class="rounded-full shadow shadow-slate-800/10 outline-none ring ring-transparent w-3.5 h-3.5 bg-slate-800 border-slate-800 focus:ring-slate-800/10 active:ring-slate-800/10"
      style="position:absolute; top:50%; z-index:0; transform:translate(-50%, -50%)"
      [style.left.%]="percent"
    ></button>

    <div
      *ngFor="let tick of ticks"
      class="absolute h-full -translate-x-1/2 text-white-600 before:absolute before:left-1/2 before:rounded-full before:content-[''] text-sm before:h-2 before:w-px top-3 before:-top-3 before:bg-primary"
      [style.left.%]="tick.percent"
    >
      {{ tick.value.toFixed(1) }}
    </div>
  </div>
</div>
